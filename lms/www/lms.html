		<style id="lms-hide-onboarding">
.onboarding-step, .onboarding-card, .onboarding-dialog, .onboarding-flow,
.onboarding-progress, .getting-started-dialog, .getting-started-popup,
.welcome-dialog, .help-popup, [class*="onboarding"],
[data-doctype*="Onboarding"], [data-doctype="Onboarding Step"],
.popup-onboarding, .onboarding-checklist, .onboarding-tour {
	display: none !important;
	visibility: hidden !important;
	opacity: 0 !important;
	pointer-events: none !important;
	max-height: 0 !important;
	overflow: hidden !important;
}
</style>
<script>
(function() {
	// Patch frappe.onboarding API to always return completed status
	function patchOnboarding() {
		if (!window.frappe || !frappe.onboarding) { setTimeout(patchOnboarding, 50); return; }
		var origGet = frappe.onboarding.get_onboarding_status;
		frappe.onboarding.get_onboarding_status = function() {
			return {
				learning_onboarding_status: [
					{name:"create_first_course",completed:true},
					{name:"create_first_chapter",completed:true},
					{name:"create_first_lesson",completed:true},
					{name:"create_first_quiz",completed:true},
					{name:"invite_students",completed:true},
					{name:"create_first_batch",completed:true},
					{name:"add_batch_student",completed:true},
					{name:"add_batch_course",completed:true}
				],
				helpdesk_onboarding_status: [
					{name:"setup_email_account",completed:true},
					{name:"invite_agents",completed:true},
					{name:"setup_sla",completed:true},
					{name:"create_first_ticket",completed:true},
					{name:"assign_to_agent",completed:true},
					{name:"reply_on_ticket",completed:true},
					{name:"comment_on_ticket",completed:true},
					{name:"first_article",completed:true},
					{name:"add_invite_contact",completed:true}
				]
			};
		};
		frappe.onboarding.update_user_onboarding_status = function(steps, appName) {};
	}
	patchOnboarding();
	// MutationObserver fallback
	function hide() {
		var sel = '.onboarding-step,.onboarding-card,.onboarding-dialog,.onboarding-flow,' +
			'.onboarding-progress,.getting-started-dialog,.help-popup,' +
			'[class*="onboarding"],[data-doctype*="Onboarding"]';
		var els = document.querySelectorAll(sel);
		for (var i = 0; i < els.length; i++) {
			var e = els[i];
			if (e) { e.style.setProperty('display','none','important'); e.style.setProperty('visibility','hidden','important'); }
		}
	}
	if (document.readyState === 'loading') {
		document.addEventListener('DOMContentLoaded', function() { hide(); });
	} else { hide(); }
	var obs = new MutationObserver(function() { hide(); });
	if (document.body) obs.observe(document.body, {childList:true,subtree:true,attributes:true,attributeFilter:['class']});
	else document.addEventListener('DOMContentLoaded', function() { obs.observe(document.body, {childList:true,subtree:true,attributes:true,attributeFilter:['class']}); });
})();
</script>
